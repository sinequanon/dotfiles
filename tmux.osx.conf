set -g default-terminal "tmux-256color"
# Add true color & italics support with alacritty terminal
# set -g default-terminal "alacritty"
set -ga terminal-overrides ",xterm-256color:Tc"
# Enable OSC 8 hyperlink passthrough so clickable links from CLI tools work through tmux
set -as terminal-features ',xterm-kitty:hyperlinks'
# reattach-to-user-namespace is a Homebrew binary that wraps the shell so
# pbcopy/pbpaste and `open` work from inside tmux. On a mac where it isn't
# installed, an unconditional default-command makes EVERY new pane's shell fail
# with `command not found` (exit 127) and die instantly. Guard it so the config
# degrades gracefully: use it when present, otherwise fall back to the default
# shell (modern macOS pbcopy/pbpaste work in tmux natively anyway).
if-shell 'command -v reattach-to-user-namespace >/dev/null 2>&1' \
  'set-option -g default-command "reattach-to-user-namespace -l $SHELL"'
# With iterm-2.4 on Sierra using iTerm2 with activated "Applications in
# terminal may access clipboard.
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel pbcopy
set-option -s escape-time 10
