$os\
$username\
$hostname\
[Ņé░](bg:color_yellow fg:color_orange)\
$directory\
[Ņé░](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[Ņé░](fg:color_aqua bg:color_blue)\
