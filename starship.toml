format = """
[](color_orange)\
$os\
$username\
$hostname\
[](bg:color_yellow fg:color_orange)\
$directory\
[](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[](fg:color_aqua bg:color_blue)\
$bun\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$php\
$rust\
$scala\
[](fg:color_blue bg:color_bright_yellow)\
[](fg:color_bright_yellow bg:color_bright_orange)\
[](fg:color_bright_orange bg:color_muddy_green)\
[](fg:color_muddy_green bg:color_bg3)\
$docker_context\
[](fg:color_bg3 bg:color_bg1)\
$time\
[ ](fg:color_bg1)\
"""
# []
# []
command_timeout = 15000

palette = 'gruvbox_dark'

# Theme palettes — switch the active one with `theme <name>` (theme-switch.sh),
# which rewrites the `palette = '...'` line above. Each palette maps the same
# semantic color names (used throughout this file) to a theme's values, so the
# whole prompt recolors by flipping one line. Add a new mood by adding a block.

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_fg1 = '#ebdbb2'
color_bg0 = '#282828'
color_bg1 = '#3c3836'
color_bg2 = '#504945'
color_bg3 = '#665c54'
color_bg4 = '#7c6f64'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'
color_bright_red = '#fb4934'
color_bright_green = '#41FF00'
color_bright_yellow = '#fabd2f'
color_bright_blue = '#83a598'
color_bright_purple = '#d3869b'
color_bright_aqua = '#8ec07c'
color_bright_orange = '#fe8019'
color_light_grey = '#a89984'
color_muddy_green = '#83a598'

# Original "Bad Wolf"-era prompt colors, mapped onto the same segment roles:
#   orange=user/host  yellow=directory  aqua=git  blue=languages
#   bg3=docker  bg1=time  fg0=segment text
[palettes.badwolf]
color_fg0 = '#2f4858'
color_bg1 = '#33658A'
color_bg3 = '#06969A'
color_blue = '#86BBD8'
color_aqua = '#FCA17D'
color_green = '#98971a'
color_orange = '#9A348E'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#DA627D'
color_bright_red = '#fb4934'
color_bright_green = '#41FF00'
color_bright_yellow = '#fabd2f'
color_bright_blue = '#83a598'
color_bright_purple = '#d3869b'
color_bright_aqua = '#8ec07c'
color_bright_orange = '#fe8019'
color_light_grey = '#a89984'
color_muddy_green = '#83a598'

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like   or disable this
# and use the os module below
[username]
show_always = true
style_user = "bg:color_orange"
style_root = "bg:color_orange"
format = '[$user]($style)'
disabled = false

[hostname]
ssh_only = false
style = "bg:color_orange"
format = '[@$hostname ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:color_orange"
format = "[$symbol ]($style)"
disabled = false # Disabled by default

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
#AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

[directory]
style = "bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
# Keep in mind that the order matters. For example:
# "Important Documents" = " 󰈙 "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important 󰈙 " = " 󰈙 "

[bun]
symbol = ""
style = "bg:color_blue fg:color_fg0"
format = '[ $symbol ($version) ]($style)'

[c]
symbol = " "
style = "bg:color_blue fg:color_fg0"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "bg:color_bg3"
format = '[ $symbol $context ]($style) $path'

[elixir]
symbol = " "
style = "bg:color_blue fg:color_fg0"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = " "
style = "bg:color_blue fg:color_fg0"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = ""
style = "bg:color_aqua fg:color_fg0"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:color_aqua fg:color_fg0"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = " "
style = "bg:color_blue fg:color_fg0"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "bg:color_blue fg:color_fg0"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = " "
style = "bg:color_blue fg:color_fg0"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "bg:color_blue fg:color_fg0"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "bg:color_blue fg:color_fg0"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "bg:color_blue fg:color_fg0"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "󰆥 "
style = "bg:color_blue fg:color_fg0"
format = '[ $symbol ($version) ]($style)'

[php]
symbol = ""
style = "bg:color_blue fg:color_fg0"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:color_blue fg:color_fg0"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "bg:color_blue fg:color_fg0"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:color_bg1"
# ♥
format = '[   $time ]($style)'
