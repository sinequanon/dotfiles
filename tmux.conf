# Enable scrolling, pane focus by click, and pane border drag-to-resize
set-option -g mouse on
# Double-click a pane to zoom/maximize it; double-click again or press Prefix+z to restore
bind -n DoubleClick1Pane resize-pane -Z

# Increase the scrollback limit
set-option -g history-limit 15000

# Enable clipboard
set-option -s set-clipboard on

# Let programs inside tmux pass terminal-native escape sequences through to the
# outer terminal. This is required for SSH desktop notifications (OSC 9/99),
# clipboard integration (OSC 52), and similar terminal features.
set -g allow-passthrough on

# https://github.com/tmux/tmux/issues/353#issuecomment-294570322
set-option -s escape-time 10

# Set the right term depending on OS
if-shell 'test "$(uname)" = "Darwin"' 'source ~/.tmux.osx.conf'
# Run below for Ubuntu
if-shell "uname | grep -q Linux" \
  "set -g default-terminal 'tmux-256color'"

# support true color and italics in tmux
set -as terminal-overrides ',*-256color:RGB:sitm=\E[3m'
# Advertise synchronized-output (DECSET 2026) support for ALL outer terminals so
# tmux re-emits \E[?2026h/\E[?2026l around its own frames. TUIs like pi wrap each
# frame in 2026 for atomic, flicker-free repaints; tmux otherwise only forwards
# this for terminals it auto-detects via XTVERSION, so unrecognized terminals
# (generic xterm-256color, VS Code, some SSH setups) flicker during large redraws
# (e.g. animations, scrolling). Harmless on terminals lacking 2026 — they ignore it.
set -as terminal-features ',*:sync'
# Allow shift/ctrl arrows keys to work properly in tmux
set-window-option -g xterm-keys on
# Enable kitty keyboard protocol sequences (required for C-Enter / C-- bindings)
set -g extended-keys on
set -g extended-keys-format csi-u

# Prevent tmux from clearing screen when applications like vim or less exit
set-window-option -g alternate-screen off

# Sets escape timeout to 0
set -sg escape-time 0

#remap prefix to Control + a
unbind C-b
set -g prefix C-a
bind a send-prefix

# force reload of config file. Both r and R reload; they also restart any open
# pane-overview sidebar so edits to its script take effect (re-sourcing the
# config reloads bindings/options but cannot restart the sidebar's long-lived
# render process — see .config/tmux/tmux-pane-sidebar.sh).
unbind r
bind r source-file ~/.tmux.conf \; run-shell -b "$HOME/.config/tmux/tmux-pane-sidebar.sh reload" \; display-message "tmux.conf reloaded"
bind R source-file ~/.tmux.conf \; run-shell -b "$HOME/.config/tmux/tmux-pane-sidebar.sh reload" \; display-message "tmux.conf reloaded"

#quick pane cycling
unbind ^A
bind ^A select-pane -t :.+

unbind % # Remove default binding since we’re replacing
bind | split-window -h
bind - split-window -v

# Ctrl+Enter → vertical split (side-by-side pane), no prefix required
bind -n C-Enter split-window -h -c "#{pane_current_path}"
# Ctrl+- → horizontal split (pane below), no prefix required
bind -n C-- split-window -v -c "#{pane_current_path}"

# Alt+hjkl pane navigation, no prefix required
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Set status bar
#set -g status-bg black
#set -g status-fg white
#set -g status-left ‘#[fg=green]#H’

# Clear scrollbackbuffer and reset screen
bind-key b send-keys -R \; clear-history

# Manually label the current pane. Prefix + P was unused in the current keymap
# (Prefix + comma already renames windows; Prefix + L is tmux's last-session key).
bind-key P command-prompt -I "#{@pane_label}" -p "pane label (empty clears)" "run-shell -b '$HOME/.config/tmux/set-pane-label.sh \"%%\"'"

# Renumber windows
bind w move-window -r\; display-message 'Windows renumbered...'

# ============================================================================
# PANE OVERVIEW / NAV — keyboard shortcuts      (panes in the CURRENT window)
# Scripts: .config/tmux/tmux-pane-{menu,sidebar}.sh
# ----------------------------------------------------------------------------
# tmux keys (prefix = Ctrl+a):
#   <pfx> Tab   Switcher — pop-up menu of this window's panes.
#               click / arrows / 1-9,0 = jump  ·  footer: x = kill a pane,
#               r = label a pane.
#   <pfx> e     Sidebar — toggle the pinned left sidebar (opens AND focuses it;
#               if already open, collapse <-> expand the thin strip).
#   <pfx> E     Close the sidebar.
#   <pfx> m     Stage mode (IDE tabs) — maximize ONE pane next to a mini sidebar;
#               pick a pane in the nav to swap it onto the stage; press again to
#               restore (the staged pane full-height on the left, the others
#               stacked vertically on the right).  prefix+z stays native zoom.
#               (Shadows the default mark-pane binding, unused here.)
#
# Inside the sidebar (focus it first: M-h into it, or click it):
#   j / k  or  Up / Down   move the selection
#   g / G                  jump to first / last
#   Enter                  jump to the pane  (stage mode: put it on the stage)
#   c  or  Space           collapse <-> expand the sidebar width
#   q                      close the sidebar (stage mode: restore all panes)
#   click a row            jump to that pane (stage mode: stage it)
#
# These reuse the @pane_label data shown in the border/tabs and never remap
# prefix+z. run-shell expands #{window_id}/#{client_name} so the scripts act on
# the window/client that pressed the key.
# ============================================================================
bind Tab run-shell "$HOME/.config/tmux/tmux-pane-menu.sh '#{window_id}' '#{client_name}'"
bind e run-shell "$HOME/.config/tmux/tmux-pane-sidebar.sh toggle '#{window_id}'"
bind E run-shell "$HOME/.config/tmux/tmux-pane-sidebar.sh close '#{window_id}'"
bind m run-shell "$HOME/.config/tmux/tmux-pane-sidebar.sh stage '#{window_id}'"
# Click a row in the mini sidebar (only while that window is in stage mode) to
# stage that pane; otherwise keep the default click-to-select behavior.
bind -n MouseDown1Pane if-shell -F '#{&&:#{==:#{@pane_overview_role},sidebar},#{==:#{@stage_active},1}}' \
  "run-shell -b \"$HOME/.config/tmux/tmux-pane-sidebar.sh stage-click '#{window_id}' #{mouse_y} #{pane_top}\"" \
  "select-pane -t = ; send-keys -M"

# Bad Wolf
set -g status-style bg=colour234,fg=white
set -g window-status-activity-style bold
set -g pane-border-status top
# Pane labels live in the per-pane @pane_label option so shell title updates
# (for example zsh's OSC title changes) don't overwrite them. If no label has
# been saved yet, fall back to the live command for pi/codex/claude panes.
# When the current window is zoomed, append a bold dark-blue ℤ marker so it is
# obvious that other panes are hidden; keep style blocks comma-free for tmux's
# conditional parser.
set -g pane-border-format " #H | #I:#W#{?@pane_label, | #{@pane_label},#{?#{m/r:^(pi|codex|claude)$,#{pane_current_command}}, | #{pane_current_command},}}#{?window_zoomed_flag, #[fg=colour18]#[bold]ℤ#[default],} "
set -g pane-border-style bg=colour245
set -g pane-active-border-style bg=colour39
set -g message-style bg=colour221,fg=colour16,bold
set -g status-left '#[fg=colour235,bg=colour252,bold] ❐ #S #[fg=colour252,bg=colour238,nobold]#[fg=colour245,bg=colour238,bold]#[fg=colour238,bg=colour234,nobold]'
set -g status-right '#[fg=colour238,bg=colour234,nobold]#[fg=colour245,bg=colour238] #(whoami) #[fg=colour252]#[fg=colour235,bg=colour252,bold] #(date +" %H:%M ") '
# Show the active pane's @pane_label in the bottom tab (window status) when set,
# mirroring the top pane-border style. #{@pane_label} resolves to each window's
# own active pane, so a tab reflects whichever pane is focused and updates as you
# move between panes (tmux redraws the status line on active-pane change). Falls
# back to just the window name #W when the active pane has no label. Keep the
# conditional comma-free apart from its own separators so tmux's format parser
# doesn't mis-split it.
set -g window-status-format "#[fg=white,bg=colour234] #I #W#{?@pane_label, | #{@pane_label},} "
set -g window-status-current-format "#[fg=colour234,bg=colour39]#[fg=colour25,bg=colour39,noreverse,bold] #I  #W#{?@pane_label, | #{@pane_label},} #[fg=colour39,bg=colour234,nobold]"

set -as terminal-overrides ',st*:kind@:kri@'
# Highlight active window
#set-window-option -g window-status-current-bg red

# Set window notifications
setw -g monitor-activity on
set -g visual-activity on

# Automatically set window title: hostname | pane index | current command
setw -g automatic-rename on
set -g set-titles on
set -g set-titles-string "#I #(echo '#{pane_current_command}' | sed -E 's/^[0-9]+\\.[0-9]+\\..*/claude/') [#{b:pane_current_path}]"
setw -g automatic-rename-format "#I #(echo '#{pane_current_command}' | sed -E 's/^[0-9]+\\.[0-9]+\\..*/claude/') [#{b:pane_current_path}]"

# use "v" and "s" to do vertical/horizontal splits, like vim
# bind s split-window -v
# bind v split-window -h

# Move between panes using the meta and arrow keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key -n M-S-Left select-pane -L
bind-key -n M-S-Right select-pane -R
bind-key -n M-S-Up select-pane -U
bind-key -n M-S-Down select-pane -D

# Swap panes directionally (Alt+Shift+hjkl)
bind-key -n M-H swap-pane -t '{left-of}'
bind-key -n M-J swap-pane -t '{down-of}'
bind-key -n M-K swap-pane -t '{up-of}'
bind-key -n M-L swap-pane -t '{right-of}'

# Move windows left or right
bind-key -n C-Left swap-window -t -1\; select-window -t -1
bind-key -n C-Right swap-window -t +1\; select-window -t +1
# Move focus between windows left or right
bind-key -n C-h select-window -t :-
bind-key -n C-l select-window -t :+

# Resize tmux panes using Shift + arrow keys.
# Bind both prefix and no-prefix variants so the keymap works whether you press
# <prefix> Shift+Arrow or just Shift+Arrow.  The -r flag makes repeated presses
# resize smoothly.
bind-key -r S-Down resize-pane -D 10
bind-key -r S-Up resize-pane -U 10
bind-key -r S-Left resize-pane -L 10
bind-key -r S-Right resize-pane -R 10
bind-key -n -r S-Down resize-pane -D 10
bind-key -n -r S-Up resize-pane -U 10
bind-key -n -r S-Left resize-pane -L 10
bind-key -n -r S-Right resize-pane -R 10
# Use vim keybindings in copy mode
setw -g mode-keys vi

# See https://github.com/tmux/tmux/issues/592
# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi 'v' send -X begin-selection
# Jumps to the bottom after copying
# Run below for Ubuntu
if-shell "uname | grep -q Linux" \
  "bind-key -T copy-mode-vi y send-keys -X copy-selection"
bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi V send -X rectangle-toggle
bind p paste-buffer

# Plugins
# run-shell ~/.tmux/tmux-resurrect/resurrect.tmux
